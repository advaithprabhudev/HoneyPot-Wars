services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    ports:
      - '27017:27017'
    volumes:
      - mongo-data:/data/db

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - '6379:6379'

  api:
    build: ./apps/api
    env_file: .env
    depends_on:
      - mongo
      - redis
    ports:
      - '4000:4000'

  web:
    build: ./apps/web
    depends_on:
      - api
    ports:
      - '5173:5173'

volumes:
  mongo-data:
